<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline — ROOM 37</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      color: white;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .glitch {
      font-size: 4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff0055, #ffcc00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 3rem;
      color: #ff0055;
      margin-bottom: 1rem;
    }

    p {
      color: #a0a0b0;
      max-width: 400px;
      margin-bottom: 2rem;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 2rem;
    }

    .reconnect {
      background: linear-gradient(135deg, #ff0055, #ffcc00);
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 9999px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .reconnect:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(255, 0, 85, 0.6);
    }

    .reconnect:active {
      transform: scale(0.97);
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      color: #505050;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="icon">🎮</div>
  <h1 class="glitch" data-text="OFFLINE">OFFLINE</h1>
  <p>Looks like you've lost connection. Check your internet and try again!</p>
  <button class="reconnect" onclick="window.location.reload()">Try Again</button>
  <p class="footer">ROOM 37 — Premium Party Games</p>
</body>
</html>
